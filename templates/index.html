<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Center | Deutschtest.digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; }
        h1, h2, .google-font { font-family: 'Google Sans', sans-serif; }
    </style>
</head>
<body class="bg-white text-gray-700">

    <nav class="border-b px-6 py-4 flex justify-between items-center sticky top-0 bg-white z-50">
        <div class="text-xl font-medium text-gray-500 google-font">Deutschtest.digital <span class="text-gray-400 ml-1">Hilfe</span></div>
        <div class="flex items-center space-x-4">
            <button class="text-gray-500 hover:bg-gray-100 p-2 rounded-full">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </div>
    </nav>

    <div class="py-16 px-4">
        <div class="max-w-3xl mx-auto text-center">
            <h1 class="text-4xl mb-10 text-gray-800">Wie können wir helfen?</h1>
            
            <div class="relative max-w-2xl mx-auto group">
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <input type="text" placeholder="Hier bitte Frage eingeben" 
                       class="w-full py-4 pl-14 pr-4 rounded-xl border border-gray-200 shadow-sm focus:shadow-md focus:outline-none focus:ring-2 focus:ring-blue-100 transition-all text-lg">
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-6 mb-20">
        <h2 class="text-xl mb-6 font-medium google-font">In Hilfe-Themen suchen</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            {% for cat in categories %}
            <div class="border rounded-xl p-6 hover:bg-gray-50 transition-colors cursor-pointer group">
                <div class="text-blue-600 mb-3 group-hover:scale-110 transition-transform">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                </div>
                <h3 class="font-medium text-gray-900">{{ cat.title }}</h3>
                <p class="text-sm text-gray-500 mt-1 leading-relaxed">{{ cat.text }}</p>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="bg-blue-50 border-t border-blue-100 py-12 px-6">
        <div class="max-w-3xl mx-auto text-center">
            <h2 class="text-xl font-medium mb-2 google-font">Benötigen Sie weitere Hilfe?</h2>
            <p class="text-gray-600 mb-8">Kontaktieren Sie uns für individuelle Unterstützung.</p>
            
            <button class="bg-blue-600 text-white px-8 py-3 rounded-full font-medium hover:bg-blue-700 shadow-md transition-all">
                Kontakt aufnehmen
            </button>
        </div>
    </div>

</body>
</html>
